<!doctype html>
<html>
    <head>
        <title>梶塚太智</title>
        <link
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="inline-container">
            <div class="inline-item"><img id="icon" src="icon.png" /></div>
            <div class="inline-item">
                <p id="name">梶塚太智</p>
                <p>プログラミング初心者</p>
                <p style="margin-bottom: 5%">言語を自作する程度の能力</p>
                <p class="degree">
                    <i class="fas fa-building"></i>
                    KADOKAWAドワンゴ情報工科学院
                </p>
                <p class="degree">
                    <i class="fas fa-map-marker-alt"></i>
                    東京 五反田
                </p>
                <p class="degree">
                    <i class="fab fa-github"></i>
                    <a href="https://github.com/KajizukaTaichi"
                        >KajizukaTaichi</a
                    >
                </p>
            </div>
        </div>
        <hr />
        <div id="main"></div>
    </body>
    <style>
        body {
            font-size: large;
        }
        i {
            font-size: 100%;
            color: grey;
        }

        h1,
        p {
            margin: 0;
            padding: 0;
        }

        #icon {
            border-radius: 50%;
            width: 300px;
            height: 300px;
        }

        #main {
            padding-left: 5vw;
            padding-right: 5vw;
        }

        .inline-container {
            display: flex;
            height: max-content;
        }

        .inline-item {
            font-size: 100px;
            padding: 10px;
        }

        .inline-item #name {
            font-size: 60%;
        }

        .inline-item .degree {
            font-size: 20%;
            color: grey;
        }

        a {
            color: grey;
        }

        .inline-item p {
            font-size: 25%;
        }
    </style>
</html>

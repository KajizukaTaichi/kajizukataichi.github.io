<!doctype html>
<html>
    <head>
        <title>梶塚太智</title>
        <link
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="inline-container">
            <div class="inline-item"><img id="icon" src="icon.png" /></div>
            <div class="inline-item">
                <div style="margin-bottom: 5%">
                    <p id="name">梶塚太智</p>
                    <p>プログラミング初心者</p>
                </div>
                <div>
                    <p class="degree">
                        <i class="fas fa-building"></i>
                        KADOKAWAドワンゴ情報工科学院
                    </p>
                    <p class="degree">
                        <i class="fas fa-map-marker-alt"></i>
                        東京 五反田
                    </p>
                    <p class="degree">
                        <i class="fab fa-github"></i>
                        <a href="https://github.com/KajizukaTaichi">
                            KajizukaTaichi
                        </a>
                    </p>
                </div>
            </div>
        </div>
        <hr />
        <div id="main">
            <h1>言語を自作する程度の能力</h1>
        </div>
    </body>
    <style>
        body {
            font-size: large;
        }
        i {
            font-size: 100%;
            color: grey;
        }

        h1,
        p {
            font-weight: lighter;
            margin: 0;
            padding: 0;
        }

        #icon {
            border-radius: 50%;
            width: 300px;
            height: 300px;
        }

        #main {
            padding-top: 5vh;
            padding-left: 5vw;
            padding-right: 5vw;
        }

        .inline-container {
            display: flex;
            height: max-content;
        }

        .inline-item {
            position: relative;
            font-size: 100px;
            padding: 10px;
        }

        .inline-item #name {
            font-size: 70%;
        }

        .inline-item .degree {
            font-size: 25%;
            color: grey;
        }

        a {
            color: grey;
        }

        .inline-item p {
            font-size: 30%;
        }

        @media (prefers-color-scheme: light) {
            body {
                background-color: #ffffff;
                color: #000000;
            }
        }

        /* ダークモード用のスタイル */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #ffffff;
            }
        }
    </style>
</html>
